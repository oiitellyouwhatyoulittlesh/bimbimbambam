<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delish Doughnuts</title>
    <!-- Google Fonts Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&family=Rammetto+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Header Area -->
    <header class="main-header">
        <h1>DELISH DOUGHNUTS</h1>
    </header>

    <!-- Hero Image -->
    <div class="img-box">
        <img src="images/doughnut1.jpg" alt="Tasty doughnuts" class="fluid-img">
    </div>

    <!-- Main Text Content -->
    <main class="content">
        <p>Rad mates making <span class="highlight">rad</span> doughnuts.</p>
        
        <p>We use local ingredients for maximum taste. New wicked flavours every day.</p>
        
        <p>Our doughnuts are fresh, interesting, and guaranteed <span class="highlight">delish</span>.</p>
        
        <button type="button" class="btn-order">Order now</button>
    </main>

    <!-- Secondary Image -->
    <div class="img-box">
        <img src="images/doughnut2.jpg" alt="Fresh doughnut close up" class="fluid-img">
    </div>

</body>
</html>
